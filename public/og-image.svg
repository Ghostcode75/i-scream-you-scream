<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8F0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFE8D6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFDBC5;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Ice Cream Truck (left side) -->
  <g transform="translate(150, 150)">
    <!-- Main body -->
    <rect x="0" y="30" width="240" height="120" rx="12" fill="#F9F4EE" stroke="#3A2D1E" stroke-width="6"/>

    <!-- Cabin -->
    <rect x="246" y="48" width="90" height="84" rx="9" fill="#E84B3A" stroke="#3A2D1E" stroke-width="6"/>

    <!-- Window -->
    <rect x="264" y="66" width="54" height="36" rx="6" fill="#B8E4F9"/>

    <!-- Ice cream display windows -->
    <rect x="24" y="48" width="36" height="48" rx="6" fill="#FFD93D"/>
    <rect x="72" y="48" width="36" height="48" rx="6" fill="#FF8FAB"/>
    <rect x="120" y="48" width="36" height="48" rx="6" fill="#8FD8A8"/>
    <rect x="168" y="48" width="36" height="48" rx="6" fill="#B8E4F9"/>

    <!-- Text -->
    <text x="42" y="130" font-size="24" fill="#3A2D1E" font-weight="bold" text-anchor="middle">ICE</text>
    <text x="138" y="130" font-size="24" fill="#3A2D1E" font-weight="bold" text-anchor="middle">CREAM</text>

    <!-- Wheels -->
    <circle cx="72" cy="155" r="18" fill="#555" stroke="#3A2D1E" stroke-width="6"/>
    <circle cx="72" cy="155" r="8" fill="#999"/>
    <circle cx="282" cy="155" r="18" fill="#555" stroke="#3A2D1E" stroke-width="6"/>
    <circle cx="282" cy="155" r="8" fill="#999"/>

    <!-- Roof -->
    <polygon points="114,30 132,30 123,-24" fill="#FFD93D" stroke="#3A2D1E" stroke-width="3"/>
    <circle cx="123" cy="-24" r="12" fill="#FF8FAB" stroke="#3A2D1E" stroke-width="3"/>
  </g>

  <!-- Text (right side) -->
  <g transform="translate(550, 150)">
    <!-- Main headline -->
    <text x="0" y="80" font-size="96" font-weight="800" fill="#3A2D1E" font-family="Fredoka, system-ui">I Scream,</text>
    <text x="0" y="180" font-size="96" font-weight="800" fill="#3A2D1E" font-family="Fredoka, system-ui">You Scream</text>

    <!-- Subheading -->
    <text x="0" y="240" font-size="36" fill="#7A6B5A" font-family="system-ui">Request the Ice Cream Truck</text>

    <!-- CTA -->
    <rect x="0" y="270" width="400" height="80" rx="20" fill="#E84B3A"/>
    <text x="200" y="330" font-size="44" font-weight="700" fill="white" text-anchor="middle" font-family="Fredoka, system-ui">Ring the Bell!</text>
  </g>

  <!-- Decorative elements -->
  <g opacity="0.3">
    <circle cx="100" cy="80" r="30" fill="#FFD93D"/>
    <circle cx="1100" cy="550" r="50" fill="#E84B3A"/>
    <circle cx="1050" cy="100" r="40" fill="#8FD8A8"/>
  </g>
</svg>